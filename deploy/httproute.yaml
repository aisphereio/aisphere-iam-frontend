apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: iam-console
  namespace: aisphere
  labels:
    app.kubernetes.io/name: aisphere-iam-frontend
    app.kubernetes.io/part-of: aisphere
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aisphere-gateway
      namespace: aisphere
      sectionName: https
  hostnames:
    - iam.weagent.cc
  rules:
    # 前端 SPA 页面
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aisphere-iam-frontend
          port: 3000
    # IAM 后端 API
    - matches:
        - path:
            type: PathPrefix
            value: /v1/iam
      backendRefs:
        - name: aisphere-iam
          port: 18080