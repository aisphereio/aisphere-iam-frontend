apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisphere-iam-frontend
  namespace: aisphere
  labels:
    app: aisphere-iam-frontend
    service: iam-frontend
    app.kubernetes.io/name: aisphere-iam-frontend
    app.kubernetes.io/part-of: aisphere
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: aisphere-iam-frontend
  template:
    metadata:
      labels:
        app: aisphere-iam-frontend
        service: iam-frontend
        app.kubernetes.io/name: aisphere-iam-frontend
        app.kubernetes.io/part-of: aisphere
    spec:
      serviceAccountName: aisphere-iam-frontend
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: aliyun-registry
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: registry.cn-beijing.aliyuncs.com/ainfracn/aisphere-iam-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: TZ
              value: Asia/Shanghai
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: next-cache
          emptyDir:
            sizeLimit: 256Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aisphere-iam-frontend
  namespace: aisphere
  labels:
    app.kubernetes.io/name: aisphere-iam-frontend
    app.kubernetes.io/part-of: aisphere
automountServiceAccountToken: false
