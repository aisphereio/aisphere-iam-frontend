name: Build and Push Frontend Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  IMAGE_NAME: ainfracn/aisphere-iam-frontend

concurrency:
  group: frontend-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production build
        run: npm run build
        env:
          NEXT_PUBLIC_IAM_URL: ${{ vars.NEXT_PUBLIC_IAM_URL }}
          NEXT_PUBLIC_GATEWAY_LOGIN_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_LOGIN_URL }}
          NEXT_PUBLIC_GATEWAY_LOGOUT_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_LOGOUT_URL }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=aisphere-iam-frontend
            org.opencontainers.image.description=Aisphere IAM web console

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_IAM_URL=${{ vars.NEXT_PUBLIC_IAM_URL }}
            NEXT_PUBLIC_GATEWAY_LOGIN_URL=${{ vars.NEXT_PUBLIC_GATEWAY_LOGIN_URL }}
            NEXT_PUBLIC_GATEWAY_LOGOUT_URL=${{ vars.NEXT_PUBLIC_GATEWAY_LOGOUT_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish build summary
        if: always()
        run: |
          {
            echo '### Frontend image build'
            echo
            echo '- Repository: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}`'
            echo '- Commit: `${{ github.sha }}`'
            echo '- Pushed: `${{ github.event_name != 'pull_request' }}`'
          } >> "$GITHUB_STEP_SUMMARY"
