name: Deploy Frontend to Kubernetes

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy, for example latest, v0.1.0, or sha-abcdef0
        required: true
        default: latest
        type: string
      environment:
        description: GitHub Environment containing the target cluster secrets
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: read

env:
  NAMESPACE: aisphere
  DEPLOYMENT: aisphere-iam-frontend
  CONTAINER: frontend
  IMAGE_REPOSITORY: registry.cn-beijing.aliyuncs.com/ainfracn/aisphere-iam-frontend

concurrency:
  group: frontend-deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$KUBE_CONFIG_B64" || { echo 'KUBE_CONFIG_B64 is not configured'; exit 1; }
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info

      - name: Check deployment prerequisites
        shell: bash
        run: |
          set -euo pipefail
          kubectl get gateway aisphere-gateway -n aisphere-system
          kubectl get secret aliyun-registry -n "$NAMESPACE"
          kubectl get secret casdoor-iam-web-oidc -n "$NAMESPACE"

      - name: Apply Kubernetes manifests
        run: kubectl apply -k deploy

      - name: Pin deployment image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_REPOSITORY}:${{ inputs.image_tag }}"
          kubectl set image "deployment/${DEPLOYMENT}" "${CONTAINER}=${IMAGE}" -n "$NAMESPACE"
          echo "DEPLOYED_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Wait for rollout
        run: kubectl rollout status "deployment/${DEPLOYMENT}" -n "$NAMESPACE" --timeout=5m

      - name: Show deployed resources
        if: always()
        shell: bash
        run: |
          kubectl get deployment,service,httproute -n "$NAMESPACE" \
            -l app.kubernetes.io/name=aisphere-iam-frontend -o wide || true
          kubectl get securitypolicy iam-console-oidc -n "$NAMESPACE" -o wide || true

      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo '### IAM frontend deployment'
            echo
            echo '- Environment: `${{ inputs.environment }}`'
            echo '- Namespace: `${{ env.NAMESPACE }}`'
            echo '- Image: `${DEPLOYED_IMAGE:-${IMAGE_REPOSITORY}:${{ inputs.image_tag }}}`'
            echo '- Public origin: `https://iam.weagent.cc`'
          } >> "$GITHUB_STEP_SUMMARY"
